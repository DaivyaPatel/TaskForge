version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskforge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./server:/app
      - /app/node_modules 
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/taskforge?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretdevkey
      - JWT_REFRESH_SECRET=supersecretrefreshkey
      - CLIENT_ORIGIN=http://localhost:5173
      - TOTP_ISSUER=TaskForge
    command: sh -c "npm install -g pnpm && pnpm install && pnpm run dev"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install -g pnpm && pnpm install && pnpm run dev"
    depends_on:
      - server

volumes:
  pgdata: